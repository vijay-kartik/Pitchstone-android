name: Android CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4

      # The gateway API key is injected from a repository secret when configured;
      # otherwise the build falls back to an empty key, same as a fresh checkout.
      - name: Create local.properties
        run: echo "GATEWAY_API_KEY=${{ secrets.GATEWAY_API_KEY }}" > local.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload debug APK
        id: upload_apk
        uses: actions/upload-artifact@v4
        with:
          name: pitchstone-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error

      # Posts the artifact download link on the PR associated with the pushed
      # commit, editing the same comment on subsequent builds instead of
      # stacking a new one per push.
      - name: Comment APK link on PR
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        env:
          ARTIFACT_URL: ${{ steps.upload_apk.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const pr = prs.find((p) => p.state === 'open');
            if (!pr) {
              core.info('No open PR for this commit; skipping comment.');
              return;
            }

            const marker = '<!-- pitchstone-apk-comment -->';
            const shortSha = context.sha.substring(0, 7);
            const body = [
              marker,
              '### 📦 Debug APK',
              '',
              `Built from \`${shortSha}\` — [Download APK artifact](${process.env.ARTIFACT_URL}) (zipped, expires in 14 days).`,
              '',
              `Workflow run: ${process.env.RUN_URL}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
