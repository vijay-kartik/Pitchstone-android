name: Android CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4

      # The gateway API key is injected from a repository secret when configured;
      # otherwise the build falls back to an empty key, same as a fresh checkout.
      - name: Create local.properties
        run: echo "GATEWAY_API_KEY=${{ secrets.GATEWAY_API_KEY }}" > local.properties

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pitchstone-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error
